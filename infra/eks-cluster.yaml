apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: leon-sophia
  region: us-east-1   # Change to match your AWS_REGION

managedNodeGroups:
  - name: workers
    instanceType: t3.medium
    minSize: 2
    maxSize: 4
    desiredCapacity: 2
    volumeSize: 20
    amiFamily: AmazonLinux2023

iam:
  withOIDC: true   # Required for ALB controller and GitHub Actions OIDC
