apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: leon-sophia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ${ECR_REGISTRY}/leon-sophia-backend:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: leon-sophia-secrets
                  key: ANTHROPIC_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leon-sophia-secrets
                  key: DATABASE_URL
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: leon-sophia-config
                  key: FRONTEND_ORIGIN
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
