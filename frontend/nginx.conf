server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Service worker and workbox files — must never be cached immutably so updates reach users
    location ~* (sw\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # PWA manifest — short-lived so icon/name changes propagate
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # Hashed static assets — safe to cache forever (Vite adds content hash to filename)
    location ~* \.(css|png|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JS files that are NOT service workers — hashed by Vite, safe to cache
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — React Router handles all paths client-side
    location / {
        try_files $uri $uri/ /index.html;
    }
}
